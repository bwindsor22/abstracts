<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Strategy Game Navigation Overlay</title>
<!-- Load Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Load Space Grotesk Font from Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'space': ['"Space Grotesk"', 'sans-serif'],
          },
          colors: {
            'game-purple': '#1a0b2e',
            'game-accent': '#a855f7',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-blur">
    /* Custom backdrop blur for a deep, high-quality semi-translucent effect */
    .menu-overlay {
      background-color: rgba(26, 11, 46, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    
    /* Animation for menu items appearance */
    .stagger-in {
      animation: slideUp 0.4s ease-out forwards;
      opacity: 0;
    }
    
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .item-1 { animation-delay: 0.1s; }
    .item-2 { animation-delay: 0.15s; }
    .item-3 { animation-delay: 0.2s; }
    .item-4 { animation-delay: 0.25s; }
    .item-5 { animation-delay: 0.3s; }
  </style>
</head>
<body class="font-space bg-black text-white antialiased overflow-hidden">
<!-- BEGIN: Navigation Overlay -->
<div class="menu-overlay fixed inset-0 z-50 flex flex-col w-full h-full p-6" data-purpose="main-menu-container" id="dropdown-overlay">
<!-- BEGIN: Header Section -->
<header class="flex justify-end items-center mb-12">
<!-- Close Button -->
<button aria-label="Close menu" class="p-2 text-white/70 hover:text-white transition-colors focus:outline-none" data-purpose="close-button" type="button">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</button>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Menu Items List -->
<nav class="flex-grow flex flex-col space-y-4" data-purpose="navigation-list">
<!-- Library / Play Item -->
<a class="stagger-in item-1 group flex items-center p-4 rounded-xl hover:bg-white/5 transition-all duration-300" href="#">
<div class="w-12 h-12 flex items-center justify-center bg-game-accent/20 rounded-lg mr-5 group-hover:bg-game-accent/40 transition-colors">
<svg class="w-6 h-6 text-game-accent" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<span class="text-xl font-medium tracking-wide">Library</span>
<p class="text-xs text-white/40 font-light">Your collection &amp; play</p>
</div>
</a>
<!-- Profile Item -->
<a class="stagger-in item-2 group flex items-center p-4 rounded-xl hover:bg-white/5 transition-all duration-300" href="#">
<div class="w-12 h-12 flex items-center justify-center bg-white/10 rounded-lg mr-5 group-hover:bg-white/20 transition-colors">
<svg class="w-6 h-6 text-white/80" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xl font-medium tracking-wide">Profile</span>
</a>
<!-- Match History Item -->
<a class="stagger-in item-3 group flex items-center p-4 rounded-xl hover:bg-white/5 transition-all duration-300" href="#">
<div class="w-12 h-12 flex items-center justify-center bg-white/10 rounded-lg mr-5 group-hover:bg-white/20 transition-colors">
<svg class="w-6 h-6 text-white/80" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xl font-medium tracking-wide">Match History</span>
</a>
<!-- ELO Trends Item -->
<a class="stagger-in item-4 group flex items-center p-4 rounded-xl hover:bg-white/5 transition-all duration-300" href="#">
<div class="w-12 h-12 flex items-center justify-center bg-white/10 rounded-lg mr-5 group-hover:bg-white/20 transition-colors">
<svg class="w-6 h-6 text-white/80" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xl font-medium tracking-wide">ELO Trends</span>
</a>
<!-- Badges Item -->
<a class="stagger-in item-5 group flex items-center p-4 rounded-xl hover:bg-white/5 transition-all duration-300" href="#">
<div class="w-12 h-12 flex items-center justify-center bg-white/10 rounded-lg mr-5 group-hover:bg-white/20 transition-colors">
<svg class="w-6 h-6 text-white/80" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-1.006 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946 1.006 3.42 3.42 0 012.45 2.45 3.42 3.42 0 001.006 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-1.006 1.946 3.42 3.42 0 01-2.45 2.45 3.42 3.42 0 00-1.946 1.006 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-1.006 3.42 3.42 0 01-2.45-2.45 3.42 3.42 0 00-1.006-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 001.006-1.946 3.42 3.42 0 012.45-2.45z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-xl font-medium tracking-wide">Badges</span>
</a>
</nav>
<!-- END: Menu Items List -->
<!-- BEGIN: Footer Branding -->
<footer class="mt-auto pt-8 border-t border-white/5 text-center" data-purpose="menu-footer">
<div class="text-game-accent font-bold text-sm tracking-[0.2em] uppercase opacity-60">
        Tactics Engine v2.4
      </div>
</footer>
<!-- END: Footer Branding -->
</div>
<!-- END: Navigation Overlay -->
</body></html>
