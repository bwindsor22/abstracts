<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Stones - Pente Masterpiece</title>
<!-- BEGIN: Tailwind CDN and Configuration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          backdropBlur: {
            'xs': '2px',
          },
          colors: {
            'frosted-white': 'rgba(255, 255, 255, 0.15)',
            'frosted-border': 'rgba(255, 255, 255, 0.2)',
          }
        }
      }
    }
  </script>
<!-- END: Tailwind CDN and Configuration -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="background-animation">
    /* Animated deep purple fluid gradient */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(-45deg, #1a0b2e, #311b92, #4a148c, #1a0b2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
<style data-purpose="game-board-layout">
    /* Minimalist 19x19 grid container */
    .pente-grid {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      grid-template-rows: repeat(18, 1fr);
      aspect-ratio: 1 / 1;
      width: 100%;
      position: relative;
    }

    /* Grid lines */
    .grid-cell {
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Board intersection points for piece placement */
    .intersection-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(19, 1fr);
      grid-template-rows: repeat(19, 1fr);
    }

    .point {
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
  </style>
<style data-purpose="frosted-elements">
    /* Glassmorphism utility classes */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Glowing Frosted Glass Stones */
    .stone {
      width: 80%;
      height: 80%;
      border-radius: 50%;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.4);
    }

    .stone-red {
      background: radial-gradient(circle at 30% 30%, rgba(239, 68, 68, 0.6), rgba(153, 27, 27, 0.8));
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.5), inset 0 0 10px rgba(255,255,255,0.3);
    }

    .stone-blue {
      background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.6), rgba(30, 58, 138, 0.8));
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5), inset 0 0 10px rgba(255,255,255,0.3);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="flex flex-col items-center justify-between py-12 px-6">
<!-- BEGIN: MainHeader -->
<header class="w-full text-center mt-4">
<h1 class="text-white text-3xl font-extralight tracking-[0.6em] opacity-90" data-purpose="game-title">
      STONES
    </h1>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: GameBoard -->
<main class="w-full max-w-md glass-card rounded-2xl p-4 overflow-hidden" data-purpose="game-container">
<div class="pente-grid" id="board-lines">
<!-- Logic to generate 18x18 grid cells to form 19x19 intersections -->
<script data-purpose="generate-grid">
        const grid = document.getElementById('board-lines');
        for (let i = 0; i < 18 * 18; i++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          grid.appendChild(cell);
        }
      </script>
<!-- Interaction Points & Placed Stones -->
<div class="intersection-overlay">
<!-- Example placed stones for visual representation -->
<!-- Center Star Point -->
<div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div>
<div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div>
<div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div>
<div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div>
<!-- Row with pieces -->
<!-- We'll populate a few sample pieces manually for the visual mockup -->
<script data-purpose="generate-points">
          const overlay = document.querySelector('.intersection-overlay');
          for (let i = 0; i < 361; i++) {
            const point = document.createElement('div');
            point.className = 'point h-full w-full';
            
            // Random sample pieces for the aesthetic preview
            if (i === 180) { // Center
              point.innerHTML = '<div class="stone stone-blue"></div>';
            } else if (i === 181 || i === 199) {
              point.innerHTML = '<div class="stone stone-red"></div>';
            } else if (i === 161 || i === 162) {
              point.innerHTML = '<div class="stone stone-blue"></div>';
            }
            
            overlay.appendChild(point);
          }
        </script>
</div>
</div>
</main>
<!-- END: GameBoard -->
<!-- BEGIN: BottomNavigation -->
<nav class="w-full max-w-md flex justify-around items-center mb-8 px-4" data-purpose="main-navigation">
<button class="glass-card px-6 py-3 rounded-full text-white text-xs font-light tracking-widest active:scale-95 transition-transform" data-purpose="nav-undo">
      UNDO
    </button>
<button class="glass-card px-6 py-3 rounded-full text-white text-xs font-light tracking-widest active:scale-95 transition-transform" data-purpose="nav-pause">
      PAUSE
    </button>
<button class="glass-card px-6 py-3 rounded-full text-white text-xs font-light tracking-widest active:scale-95 transition-transform" data-purpose="nav-menu">
      MENU
    </button>
</nav>
<!-- END: BottomNavigation -->
</body></html>
