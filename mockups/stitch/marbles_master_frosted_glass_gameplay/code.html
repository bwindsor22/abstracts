<style>
        .glass-panel {
            background: rgba(153, 66, 240, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .marble-blue {
            background: radial-gradient(circle at 30% 30%, #4facfe 0%, #0061ff 100%);
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.4), inset 2px 2px 6px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.3);
        }
        .marble-red {
            background: radial-gradient(circle at 30% 30%, #ff4b2b 0%, #ff416c 100%);
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.4), inset 2px 2px 6px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.3);
        }
        .hex-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }
        .hex-slot {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .bg-fluid {
            background: linear-gradient(135deg, #191022 0%, #2d1b4e 50%, #191022 100%);
        }
    </style>
<style>
