<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9942f0",
                        "background-light": "#f7f6f8",

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .board-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 6px;
        }
        .node {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .node-goal-ai {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .node-goal-player {
            background: rgba(153, 66, 240, 0.1);
            box-shadow: inset 0 0 10px rgba(153, 66, 240, 0.1);
        }
        .glass-barrier {
            background: rgba(153, 66, 240, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(153, 66, 240, 0.8);
            box-shadow: 0 0 15px rgba(153, 66, 240, 0.4), inset 0 0 8px rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
