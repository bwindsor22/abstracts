<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Hexes - Master Frosted Glass</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'deep-purple': '#1a0b2e',
            'glass-red': 'rgba(239, 68, 68, 0.6)',
            'glass-blue': 'rgba(59, 130, 246, 0.6)',
          },
          backdropBlur: {
            xs: '2px',
          }
        }
      }
    }
  </script>
<style data-purpose="animated-gradient">
    /* Animated fluid gradient background */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a0b2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      width: 100vw;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
<style data-purpose="hex-grid-logic">/* Custom Hexagon Shapes using clip-path */
    .hex-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .hex-row {
      display: flex;
      margin-top: -8px; /* Vertical overlap for honeycomb */
    }

    .hex-row:first-child {
      margin-top: 0;
    }

    .hex-tile {
      width: 30px;
      height: 34.64px; /* Maintain hexagonal proportions (sqrt(3)/2 * width) */
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      margin: 0 1px; /* Small horizontal gap */
    }

    /* Row offsets to create the Hex board trapezoid shape - shifting by half width + gap */
    .row-0 { transform: translateX(calc(0 * 16px)); }
    .row-1 { transform: translateX(calc(1 * 16px)); }
    .row-2 { transform: translateX(calc(2 * 16px)); }
    .row-3 { transform: translateX(calc(3 * 16px)); }
    .row-4 { transform: translateX(calc(4 * 16px)); }
    .row-5 { transform: translateX(calc(5 * 16px)); }
    .row-6 { transform: translateX(calc(6 * 16px)); }
    .row-7 { transform: translateX(calc(7 * 16px)); }
    .row-8 { transform: translateX(calc(8 * 16px)); }
    .row-9 { transform: translateX(calc(9 * 16px)); }
    .row-10 { transform: translateX(calc(10 * 16px)); }

    /* Glowing pieces */
    .hex-red {
      background: rgba(239, 68, 68, 0.6);
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .hex-blue {
      background: rgba(59, 130, 246, 0.6);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    /* Glass buttons */
    .glass-button {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 12px 24px;
      color: white;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s;
    }</style>
</head>
<body class="flex flex-col items-center justify-between py-12">
<!-- BEGIN: Header -->
<header class="w-full text-center" data-purpose="main-header">
<h1 class="text-white text-3xl font-light tracking-[0.5em] opacity-90">
      HEXES
    </h1>
</header>
<!-- END: Header -->
<!-- BEGIN: GameBoard -->
<main class="relative flex items-center justify-center w-full px-4" id="game-container">
<div class="hex-grid-container" data-purpose="hexagonal-grid" id="board">
<!-- Grid rows generated via JS for cleanliness, but following the specified 11x11 trapezoid logic -->
</div>
</main>
<!-- END: GameBoard -->
<!-- BEGIN: BottomNavigation -->
<footer class="w-full flex justify-center gap-8 pb-8" data-purpose="game-controls">
<button class="glass-button" id="btn-undo">Undo</button>
<button class="glass-button" id="btn-pause">Pause</button>
</footer>
<!-- END: BottomNavigation -->
<script data-purpose="board-generation">    // Script to generate the 11x11 grid with specific row offsets
    const board = document.getElementById('board');
    const rows = 11;
    const cols = 11;

    for (let r = 0; r < rows; r++) {
      const rowDiv = document.createElement('div');
      rowDiv.className = `hex-row row-${r}`;
      
      for (let c = 0; c < cols; c++) {
        const hex = document.createElement('div');
        hex.className = 'hex-tile cursor-pointer';
        
        // Add some random active pieces for visual demo
        if ((r === 2 && c === 3) || (r === 5 && c === 4) || (r === 8 && c === 2)) {
          hex.classList.add('hex-red');
        } else if ((r === 4 && c === 7) || (r === 6 && c === 6) || (r === 3 && c === 9)) {
          hex.classList.add('hex-blue');
        }

        rowDiv.appendChild(hex);
      }
      board.appendChild(rowDiv);
    }</script>
<script data-purpose="interactions">
    // Simple click handler for tiles to simulate gameplay
    document.getElementById('board').addEventListener('click', (e) => {
      if (e.target.classList.contains('hex-tile') && 
          !e.target.classList.contains('hex-red') && 
          !e.target.classList.contains('hex-blue')) {
        // Toggle red for demo purposes
        e.target.classList.add('hex-red');
      }
    });
  </script>
</body></html>
