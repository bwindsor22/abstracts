<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bridges: Master Frosted Glass Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9942f0",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(153, 66, 240, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(153, 66, 240, 0.1);
        }
        .node-grid {
            display: grid;
            grid-template-columns: repeat(24, minmax(0, 1fr));
            gap: 4px;
        }
        .fluid-bg {
            background: radial-gradient(circle at 50% 50%, #2a1b3d 0%, #191022 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        .fluid-accent {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(153, 66, 240, 0.15) 0%, transparent 70%);
            filter: blur(60px);
            top: -10%;
            left: -10%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="fluid-bg">
<div class="fluid-accent"></div>
</div>
<!-- Top Navigation -->
<header class="flex items-center justify-between p-4 glass-panel border-b border-primary/20 sticky top-0 z-10">
<div class="flex items-center gap-3">
<button class="size-10 flex items-center justify-center rounded-lg bg-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary">pause</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Bridges: <span class="text-primary/80">Master Frosted Glass</span></h1>
</div>
<div class="flex items-center gap-2">
<div class="px-3 py-1 rounded-full bg-red-500/20 border border-red-500/30 text-red-400 text-xs font-bold flex items-center gap-2">
<div class="size-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                RED TURN
            </div>
<button class="size-10 flex items-center justify-center rounded-lg bg-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
</div>
</header>
<!-- Main Gameplay Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 relative">
<!-- Board Container -->
<div class="relative p-8 glass-panel rounded-xl shadow-2xl max-w-full aspect-square md:max-w-[80vh]">
<!-- Goal Lines - Top/Bottom (Red) -->
<div class="absolute top-0 left-8 right-8 h-1 bg-red-500/40 rounded-full blur-[1px]"></div>
<div class="absolute bottom-0 left-8 right-8 h-1 bg-red-500/40 rounded-full blur-[1px]"></div>
<!-- Goal Lines - Left/Right (Blue) -->
<div class="absolute left-0 top-8 bottom-8 w-1 bg-blue-500/40 rounded-full blur-[1px]"></div>
<div class="absolute right-0 top-8 bottom-8 w-1 bg-blue-500/40 rounded-full blur-[1px]"></div>
<!-- Twixt Grid -->
<div class="node-grid w-full h-full">
<!-- Row Generation (Representing 24x24) -->
<!-- We will populate a subset visual for the UI concept -->
<script>
                    const grid = document.querySelector('.node-grid');
                    for (let i = 0; i < 576; i++) {
                        const dot = document.createElement('div');
                        dot.className = "size-1.5 md:size-2 rounded-full bg-primary/20 m-auto";
                        
                        // Corner holes are traditionally empty in Twixt
                        const row = Math.floor(i / 24);
                        const col = i % 24;
                        if ((row === 0 && col === 0) || (row === 0 && col === 23) || (row === 23 && col === 0) || (row === 23 && col === 23)) {
                            dot.style.opacity = '0';
                        }
                        
                        // Mock markers
                        if (i === 150 || i === 200 || i === 252) {
                            dot.className = "size-3 md:size-4 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.6)] border border-white/20 glass-panel m-auto z-10";
                        }
                        if (i === 155 || i === 182 || i === 300) {
                            dot.className = "size-3 md:size-4 rounded-full bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.6)] border border-white/20 glass-panel m-auto z-10";
                        }
                        
                        grid.appendChild(dot);
                    }
                </script>
</div>
<!-- Mock Bridges (SVG Overlay for connections) -->
<svg class="absolute inset-0 pointer-events-none w-full h-full p-8" viewbox="0 0 100 100">
<!-- Red Bridge -->
<line stroke="rgba(239,68,68,0.6)" stroke-linecap="round" stroke-width="0.8" x1="25" x2="35" y1="30" y2="45"></line>
<line class="blur-[0.5px]" stroke="rgba(239,68,68,1)" stroke-linecap="round" stroke-width="0.2" x1="25" x2="35" y1="30" y2="45"></line>
<!-- Blue Bridge -->
<line stroke="rgba(59,130,246,0.6)" stroke-linecap="round" stroke-width="0.8" x1="60" x2="45" y1="20" y2="35"></line>
<line class="blur-[0.5px]" stroke="rgba(59,130,246,1)" stroke-linecap="round" stroke-width="0.2" x1="60" x2="45" y1="20" y2="35"></line>
</svg>
</div>
<!-- Gameplay Controls -->
<div class="mt-8 flex gap-4">
<button class="px-6 py-2 rounded-xl glass-panel bg-white/5 hover:bg-white/10 text-slate-100 flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-sm">undo</span>
                UNDO
            </button>
<button class="px-6 py-2 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/40 hover:scale-105 transition-all">
                PLACE MARKER
            </button>
<button class="px-6 py-2 rounded-xl glass-panel bg-white/5 hover:bg-white/10 text-slate-100 flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-sm">lightbulb</span>
                HINT
            </button>
</div>
</main>
<!-- Bottom Navigation Bar (Component Inspired) -->
</body></html>
