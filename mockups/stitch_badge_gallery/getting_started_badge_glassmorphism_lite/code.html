<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Badge - Getting Started</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 4s ease-in-out infinite;
    }
    .glass-shimmer {
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
    }
  </style>
<style data-purpose="badge-specific-styles">
    /* Deep Slate Background */
    body {
      background-color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* Frosted Texture & Purple Rim Light */
    .glass-badge {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(168, 85, 247, 0.4); /* Purple rim lighting */
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 
                  inset 0 0 15px rgba(168, 85, 247, 0.2);
    }

    .seedling-glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      mask-image: linear-gradient(to bottom, black, transparent);
    }
  </style>
</head>
<body class="antialiased">
<!-- BEGIN: BadgeContainer -->
<main class="flex flex-col items-center justify-center space-y-8 p-4">
<!-- BEGIN: BadgeGraphic -->
<div class="glass-badge relative w-64 h-64 rounded-3xl flex flex-col items-center justify-center overflow-hidden transition-all duration-500 hover:scale-105" data-purpose="badge-card">
<!-- Subtitle Shimmer Layer -->
<div class="glass-shimmer absolute inset-0 pointer-events-none"></div>
<!-- BEGIN: SeedlingIcon -->
<div class="relative animate-float" data-purpose="icon-wrapper">
<!-- The Seedling (SVG with Glassmorphism) -->
<svg class="drop-shadow-[0_0_15px_rgba(168,85,247,0.5)]" fill="none" height="120" viewbox="0 0 24 24" width="120" xmlns="http://www.w3.org/2000/svg">
<!-- Stem -->
<path d="M12 22V10" stroke="url(#purple-gradient)" stroke-linecap="round" stroke-width="1.5"></path>
<!-- Left Leaf -->
<path d="M12 14C12 14 8 14 5 11C2 8 2 4 2 4C2 4 6 4 9 7C12 10 12 14 12 14Z" fill="rgba(255,255,255,0.1)" stroke="rgba(168, 85, 247, 0.8)" stroke-width="1"></path>
<!-- Right Leaf -->
<path d="M12 10C12 10 16 10 19 7C22 4 22 0 22 0C22 0 18 0 15 3C12 6 12 10 12 10Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1"></path>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="purple-gradient" x1="12" x2="12" y1="22" y2="10">
<stop stop-color="#A855F7"></stop>
<stop offset="1" stop-color="#D8B4FE"></stop>
</lineargradient>
</defs>
</svg>
<!-- Subtle Light Reflection -->
<div class="absolute top-0 left-1/4 w-1/2 h-2 bg-white/20 blur-md rounded-full rotate-[-45deg]"></div>
</div>
<!-- END: SeedlingIcon -->
<!-- Rarity Indicator -->
<div class="absolute bottom-6 px-4 py-1 rounded-full bg-white/5 border border-white/10">
<span class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-medium">Common</span>
</div>
</div>
<!-- END: BadgeGraphic -->
<!-- BEGIN: BadgeInfo -->
<section class="text-center space-y-2" data-purpose="badge-metadata">
<h1 class="text-2xl font-light text-white tracking-tight">Getting Started</h1>
<p class="text-sm text-slate-400 max-w-xs mx-auto leading-relaxed">
        Awarded for taking your first steps into the ecosystem.
      </p>
</section>
<!-- END: BadgeInfo -->
</main>
<!-- END: BadgeContainer -->
</body></html>
