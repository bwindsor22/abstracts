<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dedicated Achievement Badge</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- BEGIN: Custom Styling -->
<style data-purpose="glass-effects">
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }
    
    .teal-glow {
      box-shadow: 0 0 15px rgba(20, 184, 166, 0.3), inset 0 0 10px rgba(20, 184, 166, 0.2);
      border: 1.5px solid rgba(45, 212, 191, 0.4);
    }

    .calendar-frosted {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    /* Subtle reflection gradient */
    .reflection {
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%);
    }
  </style>
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<!-- END: Custom Styling -->
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: Badge Container -->
<main class="relative group" data-purpose="badge-container">
<!-- Outer Square Frame -->
<div class="w-64 h-64 md:w-80 md:h-80 glass-card rounded-3xl flex flex-col items-center justify-center relative overflow-hidden">
<!-- Subtle internal reflection overlay -->
<div class="absolute inset-0 reflection pointer-events-none"></div>
<!-- BEGIN: Icon Section -->
<div class="relative z-10 mb-6" data-purpose="calendar-icon-wrapper">
<!-- Calendar Base -->
<div class="w-24 h-24 md:w-32 md:h-32 calendar-frosted rounded-2xl teal-glow flex flex-col relative overflow-hidden">
<!-- Calendar Header (The teal rim/accent area) -->
<div class="h-6 md:h-8 w-full bg-teal-500/20 border-b border-teal-500/30 flex justify-center space-x-2 items-center">
<div class="w-1.5 h-1.5 rounded-full bg-teal-400/60"></div>
<div class="w-1.5 h-1.5 rounded-full bg-teal-400/60"></div>
</div>
<!-- Calendar Grid Content (Abstract/Minimalist) -->
<div class="flex-1 p-3 grid grid-cols-3 gap-2 opacity-40">
<div class="bg-white/10 rounded-sm"></div>
<div class="bg-white/10 rounded-sm"></div>
<div class="bg-teal-400/40 rounded-sm"></div>
<div class="bg-white/10 rounded-sm"></div>
<div class="bg-white/10 rounded-sm"></div>
<div class="bg-white/10 rounded-sm"></div>
</div>
<!-- Central "Tick" or focus point -->
<div class="absolute inset-0 flex items-center justify-center pt-6">
<svg class="w-10 h-10 md:w-14 md:h-14 text-teal-400/80 filter drop-shadow-sm" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
</div>
</div>
<!-- END: Icon Section -->
<!-- BEGIN: Text Content -->
<div class="text-center z-10">
<h2 class="text-teal-400 text-xs font-semibold tracking-widest uppercase mb-1">Uncommon</h2>
<h1 class="text-white text-2xl font-light tracking-tight">Dedicated</h1>
</div>
<!-- END: Text Content -->
<!-- Decorative light streak -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-teal-500/10 blur-3xl rounded-full"></div>
</div>
<!-- Small footer tag for UI context -->
<p class="text-slate-500 text-center mt-6 text-sm font-light italic">Game Achievement Unlocked</p>
</main>
<!-- END: Badge Container -->
</body></html>
