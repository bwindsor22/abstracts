<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Badge - First Move</title>
<!-- Load Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-gradients">
    /* Custom background for the deep slate environment */
    .bg-deep-slate {
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    }

    /* Glassmorphism Lite effect */
    .glass-badge {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    /* Soft purple rim lighting */
    .purple-rim {
      filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.4));
      border: 1.5px solid rgba(168, 85, 247, 0.3);
    }

    /* Subtle frosted texture overlay */
    .frosted-texture::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen">
<!-- BEGIN: BadgeContainer -->
<main class="relative flex flex-col items-center justify-center p-4" data-purpose="badge-wrapper">
<!-- This is the main square badge frame -->
<div class="bg-deep-slate w-64 h-64 rounded-3xl flex items-center justify-center relative overflow-hidden shadow-2xl border border-slate-800">
<!-- Frosted Texture Layer -->
<div class="absolute inset-0 frosted-texture"></div>
<!-- BEGIN: IconDesign -->
<div class="relative group" data-purpose="glass-icon-container">
<!-- Background Glow -->
<div class="absolute inset-0 bg-purple-500/10 blur-2xl rounded-full"></div>
<!-- The Glass Cursor Icon -->
<div class="glass-badge purple-rim w-32 h-32 rounded-2xl flex items-center justify-center relative rotate-12 transition-transform duration-700 hover:rotate-0">
<!-- Semantic Arrow/Cursor SVG -->
<svg class="w-16 h-16 text-white/80" fill="none" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M5.5 3.21V20.87C5.5 21.39 6.07 21.7 6.5 21.41L11.5 18L21.05 11.54C21.46 11.26 21.46 10.65 21.05 10.37L6.5 0.51C6.07 0.22 5.5 0.53 5.5 1.05V3.21Z" fill="rgba(255, 255, 255, 0.15)" stroke="currentColor" stroke-width="0.5"></path>
<!-- Subtle Reflection Line -->
<path d="M7 4L16 11" stroke="white" stroke-linecap="round" stroke-opacity="0.2"></path>
</svg>
<!-- Glass Reflection Highlights -->
<div class="absolute top-2 left-2 w-1/2 h-1/2 bg-gradient-to-br from-white/20 to-transparent rounded-tl-xl"></div>
</div>
</div>
<!-- END: IconDesign -->
</div>
<!-- BEGIN: BadgeMetadata -->
<div class="mt-8 text-center space-y-1" data-purpose="badge-labels">
<h1 class="text-slate-100 text-xl font-medium tracking-wide uppercase">First Move</h1>
<div class="inline-block px-3 py-1 rounded-full bg-slate-800 border border-slate-700">
<span class="text-slate-400 text-xs font-semibold tracking-widest uppercase">Common Rarity</span>
</div>
</div>
<!-- END: BadgeMetadata -->
</main>
<!-- END: BadgeContainer -->
</body></html>
