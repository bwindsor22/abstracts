<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Classic Explorer Badge - Glassmorphism Lite</title>
<!-- BEGIN: Tailwind CSS Setup -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'slate-deep': '#0f172a',
            'teal-glow': '#2dd4bf',
          },
          backdropBlur: {
            'xs': '2px',
          }
        }
      }
    }
  </script>
<!-- END: Tailwind CSS Setup -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="glass-effects">.glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1)
    }
.glass-reflection {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 50%)
    }
.teal-rim-glow {
    box-shadow: 0 0 15px rgba(45, 212, 191, 0.3), inset 0 0 10px rgba(45, 212, 191, 0.2)
    }
.frosted-texture {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCujBdOTwSxoJ-UE740dxLfkOUQqrL2uLSqwckGw1wyxKbnMnzgO2_oLv4YOF7oqLsOWtCSIRgDjh440SduUHiPn52pTlTJdu7xqUI3MKfLfsMss_tQ0gcKgDYBTGNoq9Bp7TYvgqEYvpC4vNbHht0ZgAlXm5PLVJ4QAzWsNU0BAC7uPm4kW868rHyuYCD6dQzZKqDhNcEoyCh9WeXaIVN41CLCAqTcvYS1q8_RBk-lufAxb7fMUpvKMG_s4PKOUxI2VflIdCDoUe0K);
    opacity: 0.05;
    pointer-events: none
    }</style>
<style data-purpose="animations">
    @keyframes subtle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .animate-float {
      animation: subtle-float 4s ease-in-out infinite;
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-slate-deep min-h-screen flex items-center justify-center m-0 p-4 font-sans">
<!-- BEGIN: Badge Container -->
<main class="relative" data-purpose="badge-container">
<!-- Square Badge Foundation -->
<div class="w-64 h-64 relative overflow-hidden rounded-3xl glass-card flex items-center justify-center border border-white/10 shadow-2xl">
<!-- Frosted Texture Overlay -->
<div aria-hidden="true" class="absolute inset-0 frosted-texture"></div>
<!-- Top Left Reflection -->
<div aria-hidden="true" class="absolute inset-0 glass-reflection"></div>
<!-- BEGIN: Badge Content -->
<section class="flex flex-col items-center justify-center space-y-4 z-10" data-purpose="badge-visuals">
<!-- Hourglass Icon Container -->
<div class="relative w-32 h-32 flex items-center justify-center animate-float">
<!-- Teal Rim Lighting Effect -->
<div aria-hidden="true" class="absolute inset-0 rounded-full bg-teal-glow/5 blur-2xl"></div>
<!-- The Hourglass Shape (SVG Implementation) -->
<svg class="w-24 h-24 text-teal-glow drop-shadow-[0_0_8px_rgba(45,212,191,0.6)]" data-purpose="hourglass-icon" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" viewbox="0 0 24 24">
<!-- Top Glass -->
<path d="M5 2h14" stroke-width="1.5"></path>
<path d="M5 22h14" stroke-width="1.5"></path>
<path d="M6 2v1c0 3.3 1.9 6.2 4.7 7.5l.3.1.3-.1C14.1 9.2 16 6.3 16 3V2"></path>
<!-- Bottom Glass -->
<path d="M6 22v-1c0-3.3 1.9-6.2 4.7-7.5l.3-.1.3.1c2.8 1.3 4.7 4.2 4.7 7.5v1"></path>
<!-- Sand (Static representation for minimalist look) -->
<path d="M8 19h8" stroke-opacity="0.5"></path>
<path d="M9 17h6" stroke-opacity="0.3"></path>
</svg>
<!-- Teal Rim Glow Border -->
<div class="absolute inset-0 rounded-2xl border border-teal-glow/30 teal-rim-glow pointer-events-none"></div>
</div>
<!-- Badge Labeling -->
<div class="text-center">
<h1 class="text-white text-lg font-medium tracking-wider uppercase opacity-90">Classic Explorer</h1>
<div class="flex items-center justify-center mt-1 space-x-2">
<span class="h-px w-4 bg-teal-glow/50"></span>
<span class="text-teal-glow text-[10px] font-bold tracking-[0.2em] uppercase">Uncommon</span>
<span class="h-px w-4 bg-teal-glow/50"></span>
</div>
</div>
</section>
<!-- END: Badge Content -->
<!-- Bottom Bevel Highlight -->
<div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>
</div>
</main>
<!-- END: Badge Container -->
</body></html>
