<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Explorer Badge</title>
<!-- Tailwind CSS with Forms and Container Queries -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-glassmorphism">/* Custom styles for effects that exceed standard Tailwind utilities */
.glass-base {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37)
    }
.teal-rim-glow {
    box-shadow: inset 0 0 15px rgba(45, 212, 191, 0.3), 0 0 20px rgba(45, 212, 191, 0.1);
    border: 1px solid rgba(45, 212, 191, 0.4)
    }
.frosted-texture {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAbQbuYqg5iJlMqAKHe0NxUpY56J1k7iwftZHzSf0xIjkmcqreZrK5ByNiM7qr1Ld2j6-jxwj7_ctnIqS2UMblbzyPmzT0jrj-x-TxYqq0LeB5gQpSsNtbmprb1vqIVNjnlaFrRd7QP1DgZAKHfsiZivi5CStBcQv10FXQXpBRFuxF1kPcsV1v-FipwzHmXlIC3_AEkzhTL9qpv15KgLGzNGtrIitrd_T6ya045L8KduI9nEOJJfFBro_kJcbQeuPvevq5hsGJCM2u4);
    opacity: 0.03;
    pointer-events: none
    }
.reflection-sheen {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0) 100%)
    }</style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen m-0 p-4">
<!-- BEGIN: BadgeContainer -->
<main class="relative group" data-purpose="badge-wrapper">
<!-- Deep Slate Background Card -->
<div class="w-64 h-64 bg-slate-900 rounded-3xl flex items-center justify-center relative overflow-hidden border border-slate-800 shadow-2xl">
<!-- Subbing for the frosted texture overlay -->
<div aria-hidden="true" class="absolute inset-0 frosted-texture"></div>
<!-- BEGIN: BadgeIcon -->
<div class="relative w-40 h-40 flex items-center justify-center" data-purpose="glass-compass-icon">
<!-- Glass Base Circle -->
<div class="absolute inset-0 rounded-full glass-base teal-rim-glow flex items-center justify-center">
<!-- Interior Reflection -->
<div class="absolute inset-0 rounded-full reflection-sheen"></div>
</div>
<!-- Compass/Grid Minimalist Design -->
<div class="relative z-10 w-full h-full p-8 flex items-center justify-center">
<!-- Minimalist Compass Needle / Grid Lines -->
<svg class="w-full h-full text-teal-400 opacity-80" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 100 100">
<!-- Outer Circle Grid -->
<circle class="opacity-40" cx="50" cy="50" r="45" stroke-dasharray="2 6"></circle>
<!-- Vertical & Horizontal Lines -->
<line x1="50" x2="50" y1="10" y2="90"></line>
<line x1="10" x2="90" y1="50" y2="50"></line>
<!-- Central Compass Needle -->
<path class="opacity-90" d="M50 20 L58 50 L50 80 L42 50 Z" fill="currentColor"></path>
<!-- Accent Dots -->
<circle cx="50" cy="50" fill="white" r="2"></circle>
</svg>
</div>
</div>
<!-- END: BadgeIcon -->
<!-- Rarity Label Overlay -->
<div class="absolute bottom-4 w-full text-center">
<span class="text-[10px] uppercase tracking-[0.2em] text-teal-500 font-bold bg-teal-950/40 px-3 py-1 rounded-full border border-teal-900/50">
          Uncommon
        </span>
</div>
</div>
<!-- Metadata for Modern Explorer -->
<div class="mt-6 text-center">
<h1 class="text-slate-200 font-light text-xl tracking-wide">Modern Explorer</h1>
<p class="text-slate-500 text-sm mt-1">Digital Frontier Division</p>
</div>
</main>
<!-- END: BadgeContainer -->
</body></html>
