<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Completionist Badge - Legendary Rarity</title>
<!-- BEGIN: Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: Tailwind CDN -->
<!-- BEGIN: Custom Styling -->
<style data-purpose="glass-effects">
    /* Custom frosted glass texture effect */
    .glass-frosted {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Iridescent and golden rim glow */
    .golden-rim-glow {
      box-shadow: 
        0 0 15px rgba(255, 215, 0, 0.3),
        inset 0 0 8px rgba(255, 215, 0, 0.2);
      border: 1px solid rgba(255, 215, 0, 0.4);
    }

    /* Multi-layered glass shadow */
    .glass-depth {
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.4),
        0 4px 15px rgba(0, 0, 0, 0.3);
    }

    /* Animation for subtle iridescent shimmer */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer-text {
      background: linear-gradient(90deg, #ffd700, #fff, #ffd700);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 5s linear infinite;
    }
  </style>
<style data-purpose="layout-typography">
    body {
      background-color: #0f172a; /* Deep Slate Background */
    }
  </style>
<!-- END: Custom Styling -->
</head>
<body class="flex items-center justify-center min-h-screen m-0 overflow-hidden">
<!-- BEGIN: Badge Container -->
<main class="relative flex flex-col items-center justify-center w-full max-w-sm p-8" data-purpose="badge-wrapper">
<!-- BEGIN: Icon Design Area -->
<div class="relative w-64 h-64 flex items-center justify-center rounded-3xl glass-frosted golden-rim-glow glass-depth overflow-hidden" data-purpose="icon-canvas">
<!-- Sub-layer: Subtle Inner Glow Circle -->
<div class="absolute w-48 h-48 rounded-full bg-yellow-500/10 blur-3xl"></div>
<!-- Main Badge Content: 100% Seal -->
<div class="relative flex flex-col items-center justify-center z-10" data-purpose="badge-seal">
<!-- The '100%' Text with Iridescent Effect -->
<span class="text-6xl font-black tracking-tighter shimmer-text italic">
          100%
        </span>
<!-- Label below the percentage -->
<span class="mt-2 text-xs font-bold tracking-[0.3em] text-yellow-500/80 uppercase">
          Complete
        </span>
<!-- Decorative Laurel or Rim Accents -->
<div class="absolute -inset-8 border-[1px] border-yellow-500/20 rounded-full scale-110"></div>
<div class="absolute -inset-10 border-[1px] border-white/5 rounded-full scale-125"></div>
</div>
<!-- Surface Gloss/Highlight -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/10 to-transparent pointer-events-none"></div>
</div>
<!-- END: Icon Design Area -->
<!-- BEGIN: Badge Label Details -->
<section class="mt-12 text-center" data-purpose="badge-info">
<h1 class="text-3xl font-extrabold text-white tracking-tight">
        Completionist
      </h1>
<div class="mt-2 inline-block px-4 py-1 rounded-full border border-yellow-500/50 bg-yellow-500/10">
<span class="text-xs font-bold text-yellow-400 uppercase tracking-widest">
          Legendary
        </span>
</div>
<p class="mt-4 text-slate-400 text-sm max-w-xs leading-relaxed">
        Awarded for achieving absolute mastery and 100% completion in all endeavors.
      </p>
</section>
<!-- END: Badge Label Details -->
</main>
<!-- END: Badge Container -->
</body></html>
