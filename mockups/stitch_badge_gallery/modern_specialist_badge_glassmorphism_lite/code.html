<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Specialist - Rare Badge</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- BEGIN: Custom Style Configuration -->
<style data-purpose="glassmorphism-effects">
    /* Custom glass frosted effect that Tailwind's backdrop-blur might need help with in specific contexts */
    .glass-frost {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    /* Subtle gold rim lighting simulation */
    .gold-rim {
      box-shadow: 
        inset 0 0 15px rgba(255, 215, 0, 0.1),
        0 0 20px rgba(255, 215, 0, 0.05);
    }

    /* Circuit pattern overlay */
    .circuit-bg {
      background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
      background-size: 20px 20px;
    }

    /* Animation for subtle reflection movement */
    @keyframes shimmer {
      0% { transform: translateX(-150%) skewX(-45deg); }
      100% { transform: translateX(150%) skewX(-45deg); }
    }
    .shimmer-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: shimmer 5s infinite;
    }
  </style>
<!-- END: Custom Style Configuration -->
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen m-0 p-4">
<!-- BEGIN: Badge Container -->
<main class="relative group" data-purpose="badge-display-area">
<!-- Outer Badge Square -->
<div class="w-64 h-64 md:w-80 md:h-80 bg-slate-900 rounded-3xl relative overflow-hidden flex items-center justify-center border border-slate-800 shadow-2xl">
<!-- Subtle Circuit Background Pattern -->
<div class="absolute inset-0 circuit-bg opacity-30"></div>
<!-- BEGIN: Badge Icon Core -->
<div class="relative w-48 h-48 md:w-56 md:h-56 flex items-center justify-center" data-purpose="main-badge-icon">
<!-- The 'Brain' Glass Shape -->
<div class="glass-frost gold-rim relative w-full h-full rounded-[2.5rem] flex items-center justify-center overflow-hidden">
<!-- Moving Reflection Shimmer -->
<div class="shimmer-effect"></div>
<!-- Central Icon Content: Geometric Brain Design -->
<svg class="w-3/4 h-3/4 text-white/80" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<!-- Left Lobe -->
<path class="opacity-60" d="M9.5 3C12.5 3 14 5 14 7.5C14 10 12.5 12 9.5 12C6.5 12 5 10 5 7.5C5 5 6.5 3 9.5 3Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.75"></path>
<!-- Right Lobe -->
<path class="opacity-60" d="M14.5 3C11.5 3 10 5 10 7.5C10 10 11.5 12 14.5 12C17.5 12 19 10 19 7.5C19 5 17.5 3 14.5 3Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.75"></path>
<!-- Lower Brain Stem / Base -->
<path class="opacity-60" d="M12 12V21M12 12C10 12 8 13.5 8 16C8 18.5 10 20 12 20C14 20 16 18.5 16 16C16 13.5 14 12 12 12Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.75"></path>
<!-- Geometric Circuit Lines -->
<path d="M7 7H12M12 7L14 5M17 10H14M14 10L12 12M10 15H14" stroke="url(#goldGradient)" stroke-linecap="round" stroke-width="1"></path>
<!-- Connection Points -->
<circle cx="7" cy="7" fill="#FFD700" r="0.5"></circle>
<circle cx="17" cy="10" fill="#FFD700" r="0.5"></circle>
<circle cx="10" cy="15" fill="#FFD700" r="0.5"></circle>
<circle cx="14" cy="15" fill="#FFD700" r="0.5"></circle>
<!-- Defintions for Gradient -->
<defs>
<lineargradient id="goldGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#FFD700;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#B8860B;stop-opacity:1"></stop>
</lineargradient>
</defs>
</svg>
<!-- Inner frosted texture overlay -->
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/p6.png')] opacity-10 pointer-events-none"></div>
</div>
<!-- External Glow for Rarity -->
<div class="absolute -inset-4 bg-yellow-500/10 blur-3xl rounded-full -z-10 group-hover:bg-yellow-500/20 transition-all duration-700"></div>
</div>
<!-- END: Badge Icon Core -->
<!-- Rarity Label (Rare) -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col items-center">
<span class="text-[10px] tracking-[0.3em] text-yellow-500/80 font-bold uppercase mb-1">Rare</span>
<h2 class="text-white/90 text-sm md:text-base font-light tracking-widest uppercase">Modern Specialist</h2>
</div>
</div>
<!-- Decorative Corner Accents -->
<div class="absolute -top-1 -left-1 w-4 h-4 border-t border-l border-yellow-500/30"></div>
<div class="absolute -bottom-1 -right-1 w-4 h-4 border-b border-r border-yellow-500/30"></div>
</main>
<!-- END: Badge Container -->
</body></html>
