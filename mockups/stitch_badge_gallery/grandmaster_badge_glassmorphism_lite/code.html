<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Grandmaster Badge - Glassmorphism Lite</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes shine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    .animate-shine {
      position: relative;
      overflow: hidden;
    }
    .animate-shine::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
      animation: shine 4s infinite linear;
    }
  </style>
<style data-purpose="glass-effects">
    .glass-surface {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .magenta-gold-rim {
      /* Simulating the rim lighting described */
      box-shadow: 
        inset 0 0 15px rgba(217, 70, 239, 0.3),  /* Magenta glow */
        inset 0 0 5px rgba(234, 179, 8, 0.2),   /* Gold glow */
        0 0 20px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: BadgeContainer -->
<main class="relative group" data-purpose="badge-wrapper">
<!-- Deep Slate Square Background -->
<div class="w-64 h-64 bg-slate-900 rounded-3xl flex items-center justify-center relative overflow-hidden shadow-2xl border border-slate-800">
<!-- Subtle Background Frosted Texture Overlay -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDsKpcio-T4ZQo1GEoyVq_pmHFzdbZNTTB5xmtE3fsQ4BbB6ulZqdWmjxYM80Vdprl2GKxEe3sA_7SKkZy_T-Peoc1bVC503_969WbF8Ww38dBbFssKnOzQKYhB-ClJT-OexRJ1WjsW--WkK7CiVR5TxEfyzq5TMf0Y0laDr7SKqFHnNe_MzFB9kpKIG9TIVBcwG4GwxtFeMdH690k-OoLU7fQVvJIKkscULM-G7vZfGtSHKvvdwunVQxylHcPGm-4mJSIoMK5w3xcx');"></div>
<!-- BEGIN: CrownIcon -->
<!-- The main glassmorphic crown element -->
<div class="glass-surface magenta-gold-rim animate-shine w-40 h-40 rounded-2xl flex items-center justify-center relative z-10" data-purpose="crown-icon">
<!-- SVG Crown Visual -->
<svg class="w-24 h-24 text-white/80 drop-shadow-[0_0_8px_rgba(255,255,255,0.4)]" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"></path>
<!-- Accent gradients and rim lighting visuals are handled via CSS classes -->
</svg>
<!-- Decorative Rim Highlights -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-magenta-500/40 to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-yellow-500/30 to-transparent"></div>
</div>
<!-- END: CrownIcon -->
<!-- Rarity Label -->
<div class="absolute bottom-4 w-full text-center">
<span class="text-[10px] uppercase tracking-[0.3em] text-magenta-400 font-bold opacity-80">Epic Rarity</span>
</div>
</div>
<!-- Decorative Outer Glow -->
<div class="absolute -inset-4 bg-magenta-500/5 blur-3xl rounded-full -z-10 group-hover:bg-magenta-500/10 transition-all duration-700"></div>
<!-- Badge Title -->
<div class="mt-6 text-center">
<h1 class="text-slate-400 font-light tracking-widest uppercase text-sm">Grandmaster</h1>
<div class="h-[1px] w-12 bg-gradient-to-r from-transparent via-yellow-500/50 to-transparent mx-auto mt-2"></div>
</div>
</main>
<!-- END: BadgeContainer -->
</body></html>
